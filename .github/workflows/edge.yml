name: Edge

# Builds and publishes the JVM image from the tip of main as the `edge` Docker tag.
# Runs on a weekly schedule (every Monday 00:00 UTC) and can be triggered manually.
# Uses JVM-only build to keep runtime cost low (~2-3 min vs ~15 min for native).
#
# Published tag: hectorvent/floci:edge
#
# Required secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN

on:
  schedule:
    - cron: '0 0 * * 1'   # Every Monday at 00:00 UTC
  workflow_dispatch:        # Allow maintainers to trigger manually

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push-edge:
    name: Build and push edge image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build JVM artifact
        run: mvn clean package -DskipTests -q

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push edge image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.jvm-package
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/floci:edge
          cache-from: type=gha
          cache-to: type=gha,mode=max