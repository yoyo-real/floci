name: Docker

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: read

jobs:
  build-jvm:
    name: Build JVM artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: maven

      - name: Build JVM artifact
        run: mvn clean package -DskipTests -q

      - uses: actions/upload-artifact@v4
        with:
          name: jvm-artifact
          path: target/quarkus-app/
          retention-days: 1

  build-native-amd64:
    name: Build native artifact (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '24'
          distribution: 'mandrel'
          cache: maven
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build native executable
        run: mvn clean package -Dnative -DskipTests -B

      - uses: actions/upload-artifact@v4
        with:
          name: native-amd64
          path: target/*-runner
          retention-days: 1

  build-native-arm64:
    name: Build native artifact (arm64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '24'
          distribution: 'mandrel'
          cache: maven
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build native executable
        run: mvn clean package -Dnative -DskipTests -B

      - uses: actions/upload-artifact@v4
        with:
          name: native-arm64
          path: target/*-runner
          retention-days: 1

  push-jvm:
    name: Push JVM Docker image
    needs: build-jvm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          name: jvm-artifact
          path: quarkus-app/

      - name: Build and push JVM image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.jvm-package
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/floci:latest-jvm
            ${{ secrets.DOCKERHUB_USERNAME }}/floci:${{ steps.version.outputs.version }}-jvm
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

  push-native:
    name: Push native Docker images
    needs: [build-native-amd64, build-native-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          name: native-amd64
          path: native/amd64/

      - uses: actions/download-artifact@v4
        with:
          name: native-arm64
          path: native/arm64/

      - name: Prepare binaries
        run: |
          chmod +x native/amd64/* native/arm64/*
          cp native/amd64/*-runner native-amd64
          cp native/arm64/*-runner native-arm64

      - name: Build and push amd64 native image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.native-package
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/floci:${{ steps.version.outputs.version }}-amd64
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            BINARY_FILE=native-amd64

      - name: Build and push arm64 native image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.native-package
          platforms: linux/arm64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/floci:${{ steps.version.outputs.version }}-arm64
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            BINARY_FILE=native-arm64

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/floci:latest \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/floci:${{ steps.version.outputs.version }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/floci:${{ steps.version.outputs.version }}-amd64 \
            ${{ secrets.DOCKERHUB_USERNAME }}/floci:${{ steps.version.outputs.version }}-arm64